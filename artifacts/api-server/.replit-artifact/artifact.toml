kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 3000
name = "API Server"
paths = ["/api"]

[services.development]
run = "echo 'API server demarré par le workflow cpec-u'"

[services.production]
build = "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/cpec-u run build && pnpm --filter @workspace/api-server run build"

[services.production.run]
args = ["node", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "3000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
