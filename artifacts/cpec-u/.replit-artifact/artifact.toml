kind = "web"
previewPath = "/"
title = "CPEC-U — Gestion Académique"
version = "1.0.0"
id = "artifacts/cpec-u"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25391
name = "web"
paths = ["/"]

[services.development]
run = "PORT=3000 pnpm --filter @workspace/api-server run dev & pnpm --filter @workspace/cpec-u run dev"

[services.env]
PORT = "25391"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cpec-u", "run", "build"]
publicDir = "artifacts/cpec-u/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
